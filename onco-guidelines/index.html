<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onkoloji Rehberleri (Onco-Guidelines)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Onco-Guidelines</h1>
            <p>Güncel Onkoloji Rehberleri ve Kılavuzları</p>
        </div>
        <div class="theme-toggle">
            <!-- Sistem temasını takip etmesi hedeflendiği için toggle butonu isteğe bağlı, ancak genel minimalist yapıda eklenebilir -->
            <button id="themeToggleBtn" aria-label="Temayı Değiştir">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </header>

    <main class="container">
        <section class="filters">
            <input type="text" id="searchInput" placeholder="Rehberlerde ara... (Örn: breast, immunotherapy)">

            <div class="dropdowns">
                <select id="institutionFilter">
                    <option value="all">Tüm Kurumlar</option>
                    <option value="ASCO">ASCO</option>
                    <option value="ESMO">ESMO</option>
                    <option value="NCCN">NCCN</option>
                    <option value="ASTRO">ASTRO</option>
                    <option value="Diğer">Diğer</option>
                </select>

                <select id="cancerTypeFilter">
                    <option value="all">Tüm Kanser Türleri</option>
                    <option value="Genel Onkoloji">Genel Onkoloji</option>
                    <option value="Meme Kanseri">Meme Kanseri</option>
                    <option value="Akciğer Kanseri">Akciğer Kanseri</option>
                    <option value="Prostat Kanseri">Prostat Kanseri</option>
                    <option value="Kolorektal Kanser">Kolorektal Kanser</option>
                    <option value="Melanom">Melanom</option>
                    <option value="Over Kanseri">Over Kanseri</option>
                    <option value="Mide Kanseri">Mide Kanseri</option>
                    <option value="Pankreas Kanseri">Pankreas Kanseri</option>
                    <option value="Böbrek Kanseri">Böbrek Kanseri</option>
                </select>

                <select id="yearFilter">
                    <option value="all">Tüm Yıllar</option>
                    <!-- Yıllar JavaScript ile doldurulacak -->
                </select>
            </div>

            <div class="stats">
                <span id="resultCount">0 rehber bulundu</span>
            </div>
        </section>

        <section id="guidelinesList" class="guidelines-list">
            <div class="loading">Rehberler yükleniyor...</div>
        </section>
    </main>

    <footer>
        <p>Veriler düzenli olarak <a href="https://pubmed.ncbi.nlm.nih.gov/" target="_blank">PubMed</a> üzerinden otomatik olarak güncellenmektedir.</p>
        <p>Proje dizinindeki <code>fetch_data.js</code> betiğini çalıştırarak yeni verileri indirebilirsiniz.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
