<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terim</title>
    <style>
        :root {
            --bg-color: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
            }
        }

        body.light-mode {
            --bg-color: #ffffff;
        }

        body.dark-mode {
            --bg-color: #121212;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video controls autoplay loop playsinline>
            <source src="video.mp4" type="video/mp4">
            Tarayıcınız video etiketini desteklemiyor.
        </video>
    </div>

    <script>
        // Tema bilgisini localStorage'dan al ve uygula (ana sayfa ile tutarlılık için)
        const currentTheme = localStorage.getItem("theme");
        if (currentTheme === "dark") {
            document.body.classList.add("dark-mode");
        } else if (currentTheme === "light") {
            document.body.classList.add("light-mode");
        }
    </script>
</body>
</html>
