<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Oynatıcı</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --link-color: #0066cc;
            --link-hover: #004499;
            --border-color: #eeeeee;
            --btn-bg: #f5f5f5;
            --btn-hover: #e0e0e0;
            --input-bg: #ffffff;
            --input-text: #333333;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --link-color: #66b3ff;
                --link-hover: #99ccff;
                --border-color: #333333;
                --btn-bg: #1e1e1e;
                --btn-hover: #2c2c2c;
                --input-bg: #1e1e1e;
                --input-text: #e0e0e0;
            }
        }

        body.light-mode {
            --bg-color: #ffffff;
            --text-color: #333333;
            --link-color: #0066cc;
            --link-hover: #004499;
            --border-color: #eeeeee;
            --btn-bg: #f5f5f5;
            --btn-hover: #e0e0e0;
            --input-bg: #ffffff;
            --input-text: #333333;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --link-color: #66b3ff;
            --link-hover: #99ccff;
            --border-color: #333333;
            --btn-bg: #1e1e1e;
            --btn-hover: #2c2c2c;
            --input-bg: #1e1e1e;
            --input-text: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 500;
        }

        .home-link {
            color: var(--link-color);
            text-decoration: none;
            font-size: 0.9rem;
            margin-right: 1rem;
        }

        .home-link:hover {
            text-decoration: underline;
            color: var(--link-hover);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--input-bg);
            color: var(--input-text);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--link-color);
        }

        button {
            background-color: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        #video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        .empty-state {
            color: #888;
            font-style: italic;
            text-align: center;
        }

        .error-message {
            color: #cc0000;
            text-align: center;
        }

        @media (prefers-color-scheme: dark) {
            .error-message {
                color: #ff6666;
            }
        }
        body.dark-mode .error-message {
            color: #ff6666;
        }

        /* Instagram embed responsive styling */
        iframe.instagram-media {
            max-width: 100% !important;
            width: 100% !important;
            margin: 0 !important;
            border-radius: 8px !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center;">
                <a href="../" class="home-link">← Ana Sayfa</a>
                <h1>Instagram Oynatıcı</h1>
            </div>
            <button id="theme-toggle" aria-label="Temayı Değiştir">Tema Değiştir</button>
        </header>

        <main>
            <div class="controls">
                <input type="text" id="instagram-url" placeholder="Instagram bağlantısını buraya yapıştırın..." aria-label="Instagram bağlantısı">
                <button id="play-btn">Göster</button>
            </div>

            <div id="video-container">
                <div class="empty-state">İçerik burada görüntülenecek.</div>
            </div>
        </main>
    </div>

    <!-- Script to load embed.js globally initially -->
    <script async src="https://www.instagram.com/embed.js"></script>
    <script>
        // Tema Değiştirme Mantığı
        var themeToggleBtn = document.getElementById('theme-toggle');
        var prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");

        var currentTheme = localStorage.getItem("theme");
        if (currentTheme === "dark") {
            document.body.classList.add("dark-mode");
        } else if (currentTheme === "light") {
            document.body.classList.add("light-mode");
        }

        themeToggleBtn.addEventListener("click", function() {
            var theme;
            if (document.body.classList.contains("dark-mode")) {
                document.body.classList.remove("dark-mode");
                document.body.classList.add("light-mode");
                theme = "light";
            } else if (document.body.classList.contains("light-mode")) {
                document.body.classList.remove("light-mode");
                document.body.classList.add("dark-mode");
                theme = "dark";
            } else {
                if (prefersDarkScheme.matches) {
                    document.body.classList.add("light-mode");
                    theme = "light";
                } else {
                    document.body.classList.add("dark-mode");
                    theme = "dark";
                }
            }
            localStorage.setItem("theme", theme);
        });

        // Instagram Oynatma Mantığı
        var playBtn = document.getElementById('play-btn');
        var urlInput = document.getElementById('instagram-url');
        var videoContainer = document.getElementById('video-container');

        function extractInstagramUrl(inputUrl) {
            try {
                var urlStr = inputUrl;
                if (!urlStr.startsWith('http://') && !urlStr.startsWith('https://')) {
                    urlStr = 'https://' + urlStr;
                }
                var url = new URL(urlStr);

                if (!url.hostname.includes('instagram.com')) {
                    throw new Error('Geçerli bir Instagram bağlantısı değil.');
                }

                var pathname = url.pathname;

                if (!pathname.endsWith('/')) {
                    pathname += '/';
                }

                var validPaths = ['/p/', '/reel/', '/tv/'];
                var isValidPath = validPaths.some(function(p) { return pathname.includes(p); });

                if (!isValidPath) {
                    throw new Error('Lütfen bir gönderi (post) veya reel bağlantısı girin.');
                }

                var cleanUrl = "https://www.instagram.com" + pathname;
                return cleanUrl;
            } catch (error) {
                throw new Error(error.message || 'Bağlantı formatı hatalı.');
            }
        }

        function loadContent(url) {
            if (!url) return;

            videoContainer.innerHTML = '<div class="empty-state">Yükleniyor...</div>';

            try {
                var cleanUrl = extractInstagramUrl(url);

                // Using the blockquote method which triggers embed.js to create the proper, styled iframe
                var embedHtml = '<blockquote class="instagram-media" data-instgrm-permalink="' + cleanUrl + '" data-instgrm-version="14" style=" background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin: 1px; max-width:540px; min-width:326px; padding:0; width:99.375%; width:-webkit-calc(100% - 2px); width:calc(100% - 2px);"></blockquote>';

                videoContainer.innerHTML = embedHtml;

                // Tell Instagram script to process the new blockquote
                if (window.instgrm && window.instgrm.Embeds) {
                    window.instgrm.Embeds.process();
                } else {
                    var script = document.createElement('script');
                    script.async = true;
                    script.src = "https://www.instagram.com/embed.js";
                    script.onload = function() {
                        if (window.instgrm && window.instgrm.Embeds) {
                            window.instgrm.Embeds.process();
                        }
                    };
                    document.body.appendChild(script);
                }

            } catch (error) {
                console.error('Hata:', error);
                videoContainer.innerHTML = '<div class="error-message">Hata: ' + error.message + '<br><br>Lütfen geçerli bir Instagram gönderisi bağlantısı girdiğinizden emin olun (Örn: https://www.instagram.com/p/ABC123/).</div>';
            }
        }

        // Attach listeners. For simplicity and broad compatibility
        playBtn.onclick = function() {
            loadContent(urlInput.value.trim());
        };

        urlInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                loadContent(urlInput.value.trim());
            }
        };

    </script>
</body>
</html>
