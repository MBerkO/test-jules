name: NCCN Guidelines Downloader

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'NCCN Kullanıcı Adı (E-posta)'
        required: true
      password:
        description: 'NCCN Şifresi'
        required: true
        type: password

permissions:
  contents: write

jobs:
  download-guidelines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./nccn
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./nccn
        run: npx playwright install chromium --with-deps

      - name: Run Downloader Script
        working-directory: ./nccn
        env:
          NCCN_USERNAME: ${{ github.event.inputs.username }}
          NCCN_PASSWORD: ${{ github.event.inputs.password }}
        run: node index.js

      - name: Commit and Push New Downloads
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add nccn/downloads/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-download NCCN Guidelines" && git push)
