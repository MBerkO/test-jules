<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Kartvizit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round">
                <i class="fas fa-sun"></i>
                <i class="fas fa-moon"></i>
            </div>
        </label>
    </div>

    <main class="card">
        <div class="profile-image">
            <img src="https://via.placeholder.com/150" alt="Profil Resmi">
        </div>
        <div class="content">
            <h1 class="name">Ad Soyad</h1>
            <h2 class="title">Yazılım Geliştirici</h2>
            <p class="bio">
                Merhaba! Ben minimalist tasarımlar ve temiz kod yazmayı seven tutkulu bir geliştiriciyim.
                Web teknolojileri ve kullanıcı deneyimi üzerine çalışıyorum.
            </p>
            <div class="action-buttons">
                <a href="projects.html" class="btn-primary">Projelerim</a>
            </div>
            <div class="social-links">
                <a href="#" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="#" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="mailto:email@example.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
